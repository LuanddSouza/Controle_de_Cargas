<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Usuário</title>

    <link rel="stylesheet" href="../Style/style.css">
    <link rel="stylesheet" href="../Style/media.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
</head>

<body class="bg-gray-100">

    <!-- HEADER -->
    <header class="bg-green-700 text-white p-4 flex justify-between items-center">
        <div class="flex items-center gap-4">
            <img class="h-10" src="../img/logo-nutrepampa.png" alt="Logo">
            <h2 class="text-lg font-bold">CONTROLE DE CARGAS</h2>
        </div>

        <div class="flex gap-2">
            <button id="voltarr" class="bg-blue-500 hover:bg-blue-700 px-4 py-2 rounded-lg shadow">
                Voltar
            </button>
            <button id="sair" class="bg-red-500 hover:bg-red-600 px-4 py-2 rounded-lg shadow">
                Sair
            </button>
        </div>
    </header>

    <!-- MAIN -->
    <main class="flex justify-center items-center h-[80vh]">

        <div class="bg-white p-8 rounded-2xl shadow-lg w-full max-w-md">

            <h2 class="text-2xl font-bold mb-6 text-center">Criar Usuário</h2>

            <form class="flex flex-col gap-4" id="formUsuario">

                <!-- USUARIO -->
                <div class="flex flex-col">
                    <label class="text-sm text-gray-600">Usuário</label>
                    <input type="text" id="usuario" class="border rounded-lg p-2 focus:ring-2 focus:ring-green-500"
                        placeholder="Digite o usuário">
                </div>

                <!-- SENHA -->
                <div class="flex flex-col">
                    <label class="text-sm text-gray-600">Senha</label>
                    <input type="password" id="senha" class="border rounded-lg p-2 focus:ring-2 focus:ring-green-500"
                        placeholder="Digite a senha">
                </div>

                <!-- EMAIL -->
                <div class="flex flex-col">
                    <label class="text-sm text-gray-600">Email</label>
                    <input type="email" id="email" class="border rounded-lg p-2 focus:ring-2 focus:ring-green-500"
                        placeholder="Digite o email">
                </div>

                <!-- COMERCIAL -->
                <div class="flex flex-col">
                    <label class="text-sm text-gray-600">Usuário comercial</label>
                    <select id="comercial" class="border rounded-lg p-2 focus:ring-2 focus:ring-green-500">
                        <option value="">Selecione</option>
                        <option value="S">Sim</option>
                        <option value="N">Não</option>
                    </select>
                </div>

                <!-- TIPO -->
                <div class="flex flex-col">
                    <label class="text-sm text-gray-600">Tipo de usuário</label>
                    <select id="tipo" class="border rounded-lg p-2 focus:ring-2 focus:ring-green-500">
                        <option value="">Selecione</option>
                        <option value="producao">Produção</option>
                        <option value="qualidade">Qualidade</option>
                        <option value="carregamento">Carregamento</option>
                        <option value="financeiro">Financeiro</option>
                        <option value="adm">Administrador</option>
                    </select>
                </div>

                <button type="submit" class="bg-green-600 hover:bg-green-700 text-white py-2 rounded-lg">
                    Criar Usuário
                </button>

            </form>
        </div>

    </main>

</body>

<script>
    const permissoes = {
        producao: 2,
        qualidade: 3,
        carregamento: 4,
        financeiro: 5,
        adm: 7
    };

    const form = document.getElementById("formUsuario");

    form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const usuario = document.getElementById("usuario");
        const senha = document.getElementById("senha");
        const email = document.getElementById("email");
        const tipo = document.getElementById("tipo");
        const comercial = document.getElementById("comercial");

        let erro = false;

        [usuario, senha, email, tipo, comercial].forEach(campo => {
            campo.classList.remove("border-red-500");
        });

        if (!usuario.value.trim()) {
            usuario.classList.add("border-red-500");
            erro = true;
        }

        if (!senha.value.trim() || senha.value.length < 4) {
            senha.classList.add("border-red-500");
            erro = true;
        }

        if (!email.value.trim()) {
            email.classList.add("border-red-500");
            erro = true;
        }

        if (!tipo.value) {
            tipo.classList.add("border-red-500");
            erro = true;
        }

        if (!comercial.value) {
            comercial.classList.add("border-red-500");
            erro = true;
        }

        if (erro) {
            alert("Preencha corretamente!");
            return;
        }

        const novoUsuario = {
            usuario: usuario.value,
            senha: senha.value,
            email: email.value,
            comercial: comercial.value,
            status: permissoes[tipo.value]
        };

        try {
            const res = await fetch("/api/users", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(novoUsuario)
            });

            const data = await res.json();

            if (!res.ok) throw new Error(data.erro);

            Toastify({
                text: "Usuario criado com sucesso",
                duration: 1000,
                gravity: "top",
                position: "right",
                backgroundColor: "green"
            }).showToast();
            form.reset();

        } catch (err) {
            console.error(err);
            Toastify({
                text: "Erro ao criar usuario",
                duration: 1000,
                gravity: "top",
                position: "right",
                backgroundColor: "red"
            }).showToast();
        }
    });

    // Deslogar
    document.getElementById("sair").addEventListener("click", () => {
        localStorage.clear();
        window.location.href = "/login";
    });

    // Voltar
    document.getElementById("voltarr").addEventListener("click", () => {
        window.location.href = "/";
    });
</script>

</html>
