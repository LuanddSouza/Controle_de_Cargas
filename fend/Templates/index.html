<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Cargas</title>
    <link rel="stylesheet" href="/Style/style.css">
    <link rel="stylesheet" href="/Style/media.css">
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

    <head>
        <div class="header bg-green-700">
            <div class="header_conteudo">
                <img class="header_logo" src="/img/logo-nutrepampa.png" alt="Logo Nutrepampa">
                <h2 class="header_titulo">CONTROLE DE SAÍDA E AGENDAMENTO DE CARGAS</h2>
            </div>
            <div>
                <button id="sair"
                    class="bg-red-500 hover:bg-red-600 text-white font-semibold px-4 py-2 rounded-lg shadow-md transition duration-200">
                    Sair
                </button>
            </div>
        </div>
    </head>

    <div class="container_home gap-3 mt-10">
        <div class="bg-white p-4 rounded-2xl shadow-md flex flex-col md:flex-row gap-3 items-center">
            <select id="select_estab"
                class="w-full md:w-auto px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-600 outline-none">
                <option>Estabelecimento</option>
            </select>
            <button class="w-full md:w-auto bg-green-600 text-white px-6 py-2 rounded-lg hover:bg-green-700 transition">
                Filtrar
            </button>
        </div>
        <div class="calendario">
            <div id="calendar"></div>
        </div>
    </div>
</body>

<!-- FullCalendar JS -->
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>


<script>

    async function carregarhome() {
        const token = localStorage.getItem("token");

        if (!token) {

            window.location.href = "/login";
            return;
        }

        try {
            const response = await fetch("/home", {
                headers: {
                    "Authorization": "Bearer " + token
                }
            });

            const data = await response.json();

            if (!response.ok) {
                throw new Error(data.erro);
            }

            console.log("Dados:", data);

        } catch (err) {
            console.error(err);

            // token inválido → volta pro login
            localStorage.removeItem("token");
            window.location.href = "/login";
        }
    }

    carregarhome();
</script>

<script>
    let select = document.getElementById("select_estab");
    //1,3,5,6,7,800,802
    let estabelecimentos = ["1 - Nutrepampa Matriz", "3 - Nutrepampa Cerealista",
        "5 - Jost - Provemix", "6 - Nutrepampa Teutonia", "7 - Nutrepampa Santa Catarina", "800 - Provemix Candeias Do Jamari",
        "802 - Provemix Vilhena"];

    estabelecimentos.forEach(estab => {
        let option = document.createElement("option");
        option.value = estab;
        option.textContent = estab;

        select.appendChild(option);
    });


    document.addEventListener('DOMContentLoaded', function () {

        const calendarEl = document.getElementById('calendar');

        const calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'dayGridMonth',
            locale: 'pt-br',
            height: 600,

            events: [
                {
                    title: 'Soja',
                    date: '2026-03-19',
                    color: '#2f6fed'
                },
                {
                    title: 'Milho',
                    date: '2026-03-19',
                    color: '#28a745'
                },
                {
                    title: '🚚 Soja',
                    date: '2026-03-01'
                },
                {
                    title: '🚚 Milho',
                    date: '2026-03-27'
                }, {
                    title: 'Soja - 1000kg',
                    date: '2026-03-11'
                },
                {
                    title: 'Milho - 800kg',
                    date: '2026-03-13'
                },
                {
                    title: 'Trigo - 500kg',
                    date: '2026-03-21'
                }
            ],


            dateClick: async function (info) {
                const data = info.dateStr;
                const token = localStorage.getItem("token");

                const response = await fetch("/home", {
                    headers: {
                        "Authorization": "Bearer " + token
                    }
                });

                const dados = await response.json();

                //se comercial
                console.log(dados.user.tipo);
                if (dados.user.tipo == 'adm') {
                    window.location.href = `Templates/tabelaCargasComercial.html?data=${data}`;
                } else {
                    // Redireciona para outra página passando a data
                    window.location.href = `Templates/tabelaCargas.html?data=${data}`;
                }

            }

        });

        calendar.render();

    });
</script>

<script>
    //Deslogar
    document.getElementById("sair").addEventListener("click", () => {
        localStorage.removeItem("token"); // remove o token

        window.location.href = "/login";
    });
</script>

</html>
