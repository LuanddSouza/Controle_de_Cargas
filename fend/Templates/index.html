<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Cargas</title>
    <link rel="stylesheet" href="/Style/style.css">
    <link rel="stylesheet" href="/Style/media.css">
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

    <div class="header bg-green-700">
        <div class="header_conteudo">
            <img class="header_logo" src="/img/logo-nutrepampa.png" alt="Logo Nutrepampa">
            <h2 class="header_titulo">CONTROLE DE SAÍDA E AGENDAMENTO DE CARGAS</h2>
        </div>
        <div>
            <button id="conf"
                class="bg-blue-500 hover:bg-blue-700 text-white font-semibold px-4 py-2 rounded-lg shadow-md transition duration-200 invisible">
                Configurações
            </button>
            <button id="sair"
                class="bg-red-500 hover:bg-red-600 text-white font-semibold px-4 py-2 rounded-lg shadow-md transition duration-200">
                Sair
            </button>
        </div>
    </div>

    <div class="container_home gap-3 mt-10">
        <div class="bg-white p-4 rounded-2xl shadow-md flex flex-col md:flex-row gap-3 items-center">
            <select id="select_estab"
                class="w-full md:w-auto px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-600 outline-none">
            </select>

            <button id="btn_filtrar"
                class="w-full md:w-auto bg-green-600 text-white px-6 py-2 rounded-lg hover:bg-green-700 transition">
                Filtrar
            </button>
        </div>

        <div class="calendario relative">
            <!-- Loader -->
            <div id="loader" class="hidden absolute inset-0 bg-white/70 z-10 flex justify-center items-center">
                <div class="animate-spin rounded-full h-12 w-12 border-4 border-green-600 border-t-transparent"></div>
            </div>

            <div id="calendar"></div>
        </div>
    </div>

</body>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

<script>
    if (localStorage.getItem('tipo') == 'ADM') {
        document.getElementById('conf').classList.remove('invisible');
    }

    let calendar;
    let select = document.getElementById("select_estab");

    let estabelecimentos = [
        { id: 1, nome: "Nutrepampa Matriz" },
        { id: 3, nome: "Nutrepampa Cerealista" },
        { id: 5, nome: "Jost - Provemix" },
        { id: 6, nome: "Nutrepampa Teutonia" },
        { id: 7, nome: "Nutrepampa Santa Catarina" },
        { id: 800, nome: "Provemix Candeias Do Jamari" },
        { id: 802, nome: "Provemix Vilhena" }
    ];

    estabelecimentos.forEach(estab => {
        let option = document.createElement("option");
        option.value = estab.id;
        option.textContent = `${estab.id} - ${estab.nome}`;
        select.appendChild(option);
    });

    document.getElementById("btn_filtrar").addEventListener("click", () => {
        if (calendar) {
            calendar.refetchEvents();
        }
    });

    document.addEventListener('DOMContentLoaded', function () {

        const calendarEl = document.getElementById('calendar');

        calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'dayGridMonth',
            locale: 'pt-br',
            height: 600,

            // LOADER
            loading: function (isLoading) {
                const loader = document.getElementById("loader");

                if (isLoading) {
                    loader.classList.remove("hidden");
                } else {
                    loader.classList.add("hidden");
                }
            },

            events: async function (fetchInfo, successCallback, failureCallback) {
                try {
                    const token = localStorage.getItem("token");
                    const estab = document.getElementById("select_estab").value;

                    const response = await fetch(`/cargas-calendario?estab=${estab}`, {
                        headers: {
                            "Authorization": "Bearer " + token
                        }
                    });

                    const dados = await response.json();

                    const eventos = dados.map(item => {

                        const total = item.TOTAL_CARGAS;
                        const produzidas = item.PRODUZIDAS;
                        const faturadas = item.FATURADAS;

                        let color = '#60B8F4';

                        if (faturadas === total && total > 0) {
                            color = '#15803D';
                        } else if (produzidas === total && total > 0) {
                            color = '#F59F58';
                        }

                        return {
                            title: `
                                <div style="font-size:11px; line-height:1.1">
                                    <b>Agendamentos: ${total}</b> <br>
                                     Produzidos: ${produzidas} <br>
                                     Faturados: ${faturadas}
                                </div>
                            `,
                            date: item.DATA,
                            backgroundColor: color,
                            borderColor: color
                        };
                    });

                    successCallback(eventos);

                } catch (err) {
                    console.error(err);
                    failureCallback(err);
                }
            },

            eventContent: function (arg) {
                return { html: arg.event.title };
            },

            //CLICK NO DIA
            dateClick: function (info) {
                redirecionar(info.dateStr);
            },

            // CLICK NO EVENTO
            eventClick: function (info) {
                redirecionar(info.event.startStr);
            }
        });

        calendar.render();
    });

    async function redirecionar(data) {
        const token = localStorage.getItem("token");

        const response = await fetch("/home", {
            headers: {
                "Authorization": "Bearer " + token
            }
        });

        let codEstab = document.getElementById("select_estab").value;
        const dados = await response.json();

        if (dados.user.userCod == 'S') {
            window.location.href = `Templates/tabelaCargasComercial.html?data=${data}&estab=${codEstab}`;
        } else {
            window.location.href = `Templates/tabelaCargas.html?data=${data}&estab=${codEstab}`;
        }
    }

    document.getElementById("sair").addEventListener("click", () => {
        localStorage.removeItem("token");
        window.location.href = "/login";
    });

    document.getElementById("conf").addEventListener("click", () => {
        window.location.href = "/addUser";
    });
</script>

</html>
